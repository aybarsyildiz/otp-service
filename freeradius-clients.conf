# FreeRADIUS NAS clients for Olives Coffee Mikrotik hotspot
# Append to /etc/freeradius/3.0/clients.conf
#
# IMPORTANT: Mikrotik WAN IP can change within the ISP subnet.
# Always allow the full /24 block, not a single IP.

client mikrotik-hotspot {
    ipaddr = 159.146.16.38
    secret = olivescoffee
    nas_type = other
    require_message_authenticator = no
    limit_proxy_state = no
}

client mikrotik-wan {
    ipaddr = 159.146.16.0/24
    secret = olivescoffee
    require_message_authenticator = no
    limit_proxy_state = no
}

# Current ISP subnet (Turk Telekom / similar) — covers .85, .96, .11, etc.
client mikrotik-212 {
    ipaddr = 212.125.28.0/24
    secret = olivescoffee
    nas_type = other
    require_message_authenticator = no
    limit_proxy_state = no
}
